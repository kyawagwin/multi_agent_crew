name: Daily Stock Analysis

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight UTC
  workflow_dispatch: # Allow manual trigger
    inputs:
      ticker:
        description: 'Stock Ticker to Analyze (e.g., AAPL)'
        required: true
        default: 'AAPL'
      company:
        description: 'Company Name (e.g., Apple Inc.)'
        required: false
        default: 'Apple Inc.'

jobs:
  run-analysis:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Multi-Agent Analysis
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
      run: |
        # Run python script
        python main.py --ticker "${{ github.event.inputs.ticker || 'AAPL' }}" --company "${{ github.event.inputs.company || 'Apple Inc.' }}"
